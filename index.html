<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fMSG — fMessage</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --surface3: #22223a;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --text: #f0f0ff;
    --text2: #9090b8;
    --text3: #5a5a80;
    --border: #2a2a40;
    --msg-out: #2d2060;
    --msg-in: #1a1a2e;
    --radius: 18px;
    --shadow: 0 8px 32px rgba(108,99,255,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Golos Text', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    position: relative;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background: radial-gradient(ellipse at 20% 50%, rgba(108,99,255,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(255,101,132,0.06) 0%, transparent 50%);
    pointer-events:none; z-index:0;
  }

  /* ===== AUTH ===== */
  #auth-screen {
    position:fixed; inset:0; z-index:100;
    display:flex; align-items:center; justify-content:center;
    background: var(--bg);
    animation: fadeIn .4s ease;
  }
  .auth-box {
    width: min(420px, 92vw);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 40px 36px;
    box-shadow: var(--shadow);
    animation: slideUp .4s ease;
  }
  .auth-logo {
    font-family: 'Unbounded', sans-serif;
    font-size: 32px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 6px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .auth-sub {
    text-align:center; color:var(--text3); font-size:13px; margin-bottom:32px;
  }
  .auth-tabs {
    display:flex; gap:4px; background:var(--surface2); border-radius:12px; padding:4px; margin-bottom:28px;
  }
  .auth-tab {
    flex:1; padding:10px; border:none; background:transparent; color:var(--text2);
    border-radius:9px; cursor:pointer; font-family:'Golos Text',sans-serif; font-size:14px;
    transition: all .2s;
  }
  .auth-tab.active { background:var(--accent); color:#fff; font-weight:600; }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:12px; color:var(--text3); margin-bottom:6px; letter-spacing:.5px; }
  .field input {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    border-radius:12px; padding:13px 16px; color:var(--text);
    font-family:'Golos Text',sans-serif; font-size:15px; outline:none;
    transition: border-color .2s;
  }
  .field input:focus { border-color:var(--accent); }
  .btn-primary {
    width:100%; padding:14px; background:linear-gradient(135deg, var(--accent), #8b82ff);
    border:none; border-radius:13px; color:#fff; font-family:'Unbounded',sans-serif;
    font-size:14px; font-weight:600; cursor:pointer; transition: all .2s; letter-spacing:.5px;
    margin-top:4px;
  }
  .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(108,99,255,0.4); }
  .btn-primary:active { transform:translateY(0); }
  .auth-error { color:var(--accent2); font-size:13px; text-align:center; margin-top:10px; min-height:18px; }

  /* ===== APP LAYOUT ===== */
  #app { display:flex; height:100dvh; position:relative; z-index:1; }
  #app.hidden { display:none; }

  /* Sidebar */
  .sidebar {
    width: 320px; min-width:320px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display:flex; flex-direction:column;
    height:100dvh;
  }
  .sidebar-header {
    padding: 20px 16px 12px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--border);
  }
  .sidebar-title {
    font-family:'Unbounded',sans-serif; font-size:20px; font-weight:700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .user-badge {
    display:flex; align-items:center; gap:8px;
    background:var(--surface2); border-radius:20px; padding:6px 12px;
    cursor:pointer; transition:background .2s;
  }
  .user-badge:hover { background:var(--surface3); }
  .user-avatar {
    width:28px; height:28px; border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700; color:#fff; flex-shrink:0;
  }
  .user-badge span { font-size:13px; color:var(--text2); }

  .search-wrap { padding:12px 16px; }
  .search-box {
    display:flex; align-items:center; gap:8px;
    background:var(--surface2); border:1px solid var(--border);
    border-radius:12px; padding:10px 14px;
    transition:border-color .2s;
  }
  .search-box:focus-within { border-color:var(--accent); }
  .search-box svg { color:var(--text3); flex-shrink:0; }
  .search-box input {
    flex:1; background:none; border:none; outline:none;
    color:var(--text); font-family:'Golos Text',sans-serif; font-size:14px;
  }
  .search-box input::placeholder { color:var(--text3); }

  .chats-list { flex:1; overflow-y:auto; padding:0 8px; }
  .chats-list::-webkit-scrollbar { width:4px; }
  .chats-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .section-label {
    font-size:11px; color:var(--text3); letter-spacing:1px;
    padding:12px 8px 6px; font-weight:600;
  }

  .chat-item {
    display:flex; align-items:center; gap:12px;
    padding:10px 10px; border-radius:14px; cursor:pointer;
    transition:background .15s; position:relative;
  }
  .chat-item:hover { background:var(--surface2); }
  .chat-item.active { background:var(--surface3); }
  .chat-avatar {
    width:46px; height:46px; border-radius:50%; flex-shrink:0;
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    display:flex; align-items:center; justify-content:center;
    font-size:18px; font-weight:700; color:#fff; position:relative;
  }
  .online-dot {
    position:absolute; bottom:1px; right:1px;
    width:11px; height:11px; border-radius:50%;
    background:var(--accent3); border:2px solid var(--surface);
  }
  .chat-info { flex:1; min-width:0; }
  .chat-name { font-weight:600; font-size:14px; margin-bottom:2px; }
  .chat-preview { font-size:12px; color:var(--text3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .chat-meta { display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
  .chat-time { font-size:11px; color:var(--text3); }
  .chat-badge {
    background:var(--accent); color:#fff; border-radius:10px;
    font-size:11px; font-weight:700; padding:2px 7px; min-width:20px; text-align:center;
  }

  .search-results { padding:0 8px; }
  .search-result-item {
    display:flex; align-items:center; gap:12px;
    padding:10px; border-radius:14px; cursor:pointer; transition:background .15s;
  }
  .search-result-item:hover { background:var(--surface2); }

  /* ===== CHAT AREA ===== */
  .chat-area {
    flex:1; display:flex; flex-direction:column; height:100dvh; min-width:0;
  }
  .chat-placeholder {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
    color:var(--text3);
  }
  .chat-placeholder .big-icon { font-size:64px; opacity:.3; }
  .chat-placeholder p { font-family:'Unbounded',sans-serif; font-size:16px; font-weight:300; }

  .chat-header {
    display:flex; align-items:center; gap:12px;
    padding:14px 20px; border-bottom:1px solid var(--border);
    background:var(--surface); flex-shrink:0;
  }
  .chat-header-avatar {
    width:40px; height:40px; border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex; align-items:center; justify-content:center;
    font-size:16px; font-weight:700; color:#fff;
  }
  .chat-header-info { flex:1; }
  .chat-header-name { font-weight:600; font-size:15px; }
  .chat-header-status { font-size:12px; color:var(--accent3); }

  .messages-wrap {
    flex:1; overflow-y:auto; padding:16px 20px; display:flex; flex-direction:column; gap:6px;
  }
  .messages-wrap::-webkit-scrollbar { width:4px; }
  .messages-wrap::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .msg-group { display:flex; flex-direction:column; gap:2px; }
  .msg-row {
    display:flex; align-items:flex-end; gap:8px;
  }
  .msg-row.out { flex-direction:row-reverse; }
  .msg-row .msg-avatar {
    width:28px; height:28px; border-radius:50; flex-shrink:0;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700; color:#fff; border-radius:50%;
    align-self:flex-end;
  }
  .bubble {
    max-width:68%; padding:10px 14px; border-radius:18px;
    font-size:14px; line-height:1.5; word-break:break-word; position:relative;
  }
  .msg-row.in .bubble { background:var(--msg-in); border-bottom-left-radius:4px; }
  .msg-row.out .bubble { background:var(--msg-out); border-bottom-right-radius:4px; color:#e8e4ff; }
  .bubble-time { font-size:10px; color:var(--text3); margin-top:4px; display:block; }
  .msg-row.out .bubble-time { text-align:right; color:#8880b8; }
  .msg-sender { font-size:11px; color:var(--accent); font-weight:600; margin-bottom:2px; }

  /* Media bubbles */
  .bubble.media-bubble { padding:4px; background:transparent !important; }
  .bubble.media-bubble img, .bubble.media-bubble video {
    max-width:260px; max-height:220px; border-radius:14px; display:block;
    cursor:pointer; transition:opacity .2s;
  }
  .bubble.media-bubble img:hover, .bubble.media-bubble video:hover { opacity:.9; }

  /* Voice bubble */
  .voice-bubble {
    display:flex; align-items:center; gap:10px;
    background:var(--msg-in); border-radius:18px; padding:10px 14px;
    cursor:pointer; min-width:200px;
  }
  .msg-row.out .voice-bubble { background:var(--msg-out); }
  .voice-play-btn {
    width:36px; height:36px; border-radius:50%;
    background:var(--accent); border:none; color:#fff; cursor:pointer;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    transition:transform .15s;
  }
  .voice-play-btn:hover { transform:scale(1.1); }
  .voice-waveform { flex:1; display:flex; align-items:center; gap:2px; height:28px; }
  .voice-bar {
    flex:1; background:var(--text3); border-radius:2px; min-height:3px;
    transition:background .2s;
  }
  .voice-dur { font-size:11px; color:var(--text3); white-space:nowrap; }

  /* Circle/video message */
  .circle-bubble video {
    width:180px; height:180px; border-radius:50% !important;
    object-fit:cover; display:block; cursor:pointer;
    border:3px solid var(--accent);
  }

  /* Sticker */
  .sticker-bubble { background:transparent !important; padding:4px; }
  .sticker-emoji { font-size:64px; line-height:1; display:block; cursor:default; }

  /* ===== INPUT AREA ===== */
  .input-area {
    padding:12px 16px; border-top:1px solid var(--border);
    background:var(--surface); flex-shrink:0;
  }
  .input-toolbar {
    display:flex; align-items:flex-end; gap:8px;
  }
  .input-box-wrap {
    flex:1; background:var(--surface2); border:1px solid var(--border);
    border-radius:20px; padding:10px 14px; display:flex; align-items:flex-end; gap:8px;
    transition:border-color .2s;
  }
  .input-box-wrap:focus-within { border-color:var(--accent); }
  #msg-input {
    flex:1; background:none; border:none; outline:none; resize:none;
    color:var(--text); font-family:'Golos Text',sans-serif; font-size:15px;
    max-height:120px; min-height:22px; line-height:1.5;
  }
  #msg-input::placeholder { color:var(--text3); }
  .toolbar-btn {
    background:none; border:none; cursor:pointer; color:var(--text3);
    padding:4px; border-radius:8px; transition:color .2s, background .2s;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .toolbar-btn:hover { color:var(--accent); background:rgba(108,99,255,.1); }
  .send-btn {
    width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,var(--accent),#8b82ff);
    border:none; color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:all .2s; flex-shrink:0;
  }
  .send-btn:hover { transform:scale(1.08); box-shadow:0 4px 16px rgba(108,99,255,.4); }

  /* Recording indicator */
  .recording-indicator {
    display:none; align-items:center; gap:8px; padding:8px 14px;
    color:var(--accent2); font-size:13px; animation: pulse 1s infinite;
  }
  .recording-indicator.active { display:flex; }
  .rec-dot { width:10px; height:10px; border-radius:50%; background:var(--accent2); }

  /* ===== STICKER PICKER ===== */
  .sticker-panel {
    position:absolute; bottom:80px; left:0; right:0;
    background:var(--surface); border-top:1px solid var(--border);
    padding:16px; display:none; flex-wrap:wrap; gap:8px;
    max-height:200px; overflow-y:auto; z-index:10;
  }
  .sticker-panel.open { display:flex; }
  .sticker-btn {
    font-size:36px; cursor:pointer; padding:4px; border-radius:10px;
    transition:transform .15s, background .15s; border:none; background:none;
  }
  .sticker-btn:hover { transform:scale(1.2); background:var(--surface2); }

  /* ===== MODAL (media preview) ===== */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:999;
    display:flex; align-items:center; justify-content:center;
    animation:fadeIn .2s ease;
  }
  .modal-overlay img, .modal-overlay video {
    max-width:92vw; max-height:88vh; border-radius:14px;
  }
  .modal-close {
    position:fixed; top:20px; right:20px;
    background:rgba(255,255,255,.1); border:none; color:#fff; font-size:24px;
    border-radius:50%; width:44px; height:44px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }

  /* ===== TOAST ===== */
  .toast {
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
    background:var(--surface3); color:var(--text); padding:10px 20px;
    border-radius:20px; font-size:13px; z-index:500;
    animation:slideUp .3s ease, fadeOut .3s ease 1.7s forwards;
    white-space:nowrap; border:1px solid var(--border);
    box-shadow:var(--shadow);
  }

  /* ===== ANIMATIONS ===== */
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeOut { from{opacity:1} to{opacity:0;pointer-events:none} }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  @keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .msg-row { animation:msgIn .25s ease; }

  /* Mobile */
  @media(max-width:640px) {
    .sidebar { width:100%; min-width:unset; position:absolute; z-index:50; transition:transform .3s; }
    .sidebar.hidden-mobile { transform:translateX(-100%); }
    .chat-area { position:absolute; inset:0; }
    .back-btn { display:flex !important; }
  }
  .back-btn {
    display:none; background:none; border:none; color:var(--text2); cursor:pointer;
    padding:4px; border-radius:8px; align-items:center; justify-content:center;
  }
  .back-btn:hover { color:var(--accent); }

  /* Scrollbar global */
  ::-webkit-scrollbar { width:5px; height:5px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

  .hidden { display:none !important; }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">fMSG</div>
    <div class="auth-sub">fMessage — мессенджер нового поколения</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Войти</button>
      <button class="auth-tab" onclick="switchTab('register')">Регистрация</button>
    </div>
    <div id="login-form">
      <div class="field"><label>ИМЯ ПОЛЬЗОВАТЕЛЯ</label><input id="l-user" placeholder="@username" autocomplete="username"></div>
      <div class="field"><label>ПАРОЛЬ</label><input id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="btn-primary" onclick="doLogin()">ВОЙТИ</button>
    </div>
    <div id="reg-form" class="hidden">
      <div class="field"><label>ИМЯ ПОЛЬЗОВАТЕЛЯ</label><input id="r-user" placeholder="@username" autocomplete="username"></div>
      <div class="field"><label>ПАРОЛЬ</label><input id="r-pass" type="password" placeholder="минимум 8 символов" autocomplete="new-password"></div>
      <button class="btn-primary" onclick="doRegister()">СОЗДАТЬ АККАУНТ</button>
    </div>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">fMSG</div>
      <div class="user-badge" onclick="logout()">
        <div class="user-avatar" id="my-avatar">?</div>
        <span id="my-username">...</span>
      </div>
    </div>
    <div class="search-wrap">
      <div class="search-box">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="search-input" placeholder="Поиск по @username…" oninput="onSearch(this.value)">
      </div>
    </div>
    <div id="search-results" class="search-results hidden"></div>
    <div class="chats-list" id="chats-list">
      <div class="section-label">ДИАЛОГИ</div>
      <div id="chats-container"></div>
    </div>
  </div>

  <!-- Chat area -->
  <div class="chat-area" id="chat-area">
    <div class="chat-placeholder" id="chat-placeholder">
      <div class="big-icon">💬</div>
      <p>Выбери диалог</p>
    </div>
    <div id="active-chat" class="hidden" style="display:flex;flex-direction:column;height:100dvh;">
      <div class="chat-header">
        <button class="back-btn" id="back-btn" onclick="closeMobileChat()">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        </button>
        <div class="chat-header-avatar" id="ch-avatar">?</div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="ch-name">...</div>
          <div class="chat-header-status" id="ch-status">в сети</div>
        </div>
      </div>
      <div class="messages-wrap" id="messages-wrap"></div>
      <!-- Sticker panel -->
      <div class="sticker-panel" id="sticker-panel"></div>
      <div class="input-area" style="position:relative;">
        <div class="recording-indicator" id="rec-indicator">
          <div class="rec-dot"></div> Запись голоса…
          <button onclick="stopVoice()" style="margin-left:auto;background:var(--accent2);border:none;color:#fff;border-radius:8px;padding:4px 10px;cursor:pointer;font-size:12px;">Остановить</button>
        </div>
        <div class="input-toolbar">
          <div class="input-box-wrap">
            <button class="toolbar-btn" title="Стикеры" onclick="toggleStickers()">
              <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/></svg>
            </button>
            <textarea id="msg-input" placeholder="Сообщение…" rows="1" onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
            <label class="toolbar-btn" title="Медиа">
              <input type="file" id="file-input" accept="image/*,video/*" style="display:none" onchange="sendMedia(this)">
              <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
            </label>
            <button class="toolbar-btn" title="Кружок" onclick="sendCircle()">
              <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16"/></svg>
            </button>
            <button class="toolbar-btn" title="Голосовое" onmousedown="startVoice()" id="voice-btn">
              <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/></svg>
            </button>
          </div>
          <button class="send-btn" onclick="sendText()">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m22 2-11 11M22 2 15 22l-4-9-9-4 20-7z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="modal" style="display:none" onclick="closeModal()">
  <div class="modal-overlay">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/appwrite@17/dist/iife/sdk.js"></script>
<script>
const { Client, Account, Databases, Storage, Query, ID, Permission, Role } = Appwrite;

// ===== CONFIG =====
const PROJECT_ID = '6a2477ce001a6594b5e5';
const ENDPOINT   = 'https://cloud.appwrite.io/v1';
const DB_ID      = '6a247861001af595f2ca';
const BUCKET_ID  = '6a24787e0037838426e5';
const COL_USERS  = 'users';
const COL_MSGS   = 'messages';

const client = new Client().setEndpoint(ENDPOINT).setProject(PROJECT_ID);
const account = new Account(client);
const db      = new Databases(client);
const storage = new Storage(client);

// ===== STATE =====
let me = null;          // current user doc
let currentChat = null; // { userId, username }
let unsubscribe = null;
let mediaRecorder = null;
let audioChunks = [];
let chatsMap = {};      // userId -> last message info
let circleStream = null;

// ===== STICKERS =====
const STICKERS = ['😂','🔥','❤️','👍','😭','🎉','😍','🤯','💀','👏',
                  '😎','🥺','🤝','😤','🙈','🫡','💯','🫶','✨','🤩',
                  '😴','🥳','😡','🤣','🫠','🙏','🤙','👀','🫣','💥'];

function buildStickerPanel() {
  const panel = document.getElementById('sticker-panel');
  panel.innerHTML = STICKERS.map(s =>
    `<button class="sticker-btn" onclick="sendSticker('${s}')">${s}</button>`
  ).join('');
}
window.toggleStickers = () => {
  const p = document.getElementById('sticker-panel');
  p.classList.toggle('open');
};
window.sendSticker = async (emoji) => {
  document.getElementById('sticker-panel').classList.remove('open');
  await sendMessage({ type:'sticker', content:emoji });
};

// ===== AUTH TAB =====
window.switchTab = (tab) => {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0) === (tab==='login')));
  document.getElementById('login-form').classList.toggle('hidden', tab!=='login');
  document.getElementById('reg-form').classList.toggle('hidden', tab!=='register');
  document.getElementById('auth-error').textContent = '';
};

function setError(msg) { document.getElementById('auth-error').textContent = msg; }

// ===== REGISTER =====
window.doRegister = async () => {
  const username = document.getElementById('r-user').value.trim().replace('@','').toLowerCase();
  const pass     = document.getElementById('r-pass').value;
  if (!username || username.length < 3) return setError('Username минимум 3 символа');
  if (pass.length < 8) return setError('Пароль минимум 8 символов');
  const email = username + '@wave.local';
  setError('Создаём аккаунт…');
  try {
    await account.create(ID.unique(), email, pass, username);
    await account.createEmailPasswordSession(email, pass);
    const user = await account.get();
    // Save user doc
    try {
      await db.createDocument(DB_ID, COL_USERS, user.$id, {
        username, userId: user.$id
      });
    } catch(e) { /* might already exist */ }
    await initApp(user);
  } catch(e) {
    if (e.message?.includes('already')) setError('Этот username занят');
    else setError(e.message || 'Ошибка регистрации');
  }
};

// ===== LOGIN =====
window.doLogin = async () => {
  const username = document.getElementById('l-user').value.trim().replace('@','').toLowerCase();
  const pass     = document.getElementById('l-pass').value;
  if (!username || !pass) return setError('Заполни все поля');
  const email = username + '@wave.local';
  setError('Входим…');
  try {
    await account.createEmailPasswordSession(email, pass);
    const user = await account.get();
    await initApp(user);
  } catch(e) {
    setError('Неверный username или пароль');
  }
};

window.logout = async () => {
  if (!confirm('Выйти из аккаунта?')) return;
  try { await account.deleteSession('current'); } catch(e){}
  me = null; currentChat = null;
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app').classList.add('hidden');
};

// ===== INIT =====
async function initApp(user) {
  me = { userId: user.$id, username: user.name };
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('my-username').textContent = '@' + me.username;
  document.getElementById('my-avatar').textContent = me.username[0].toUpperCase();
  buildStickerPanel();
  await ensureCollections();
  loadChats();
  setError('');
}

async function ensureCollections() {
  // Try to create collections if they don't exist (will fail silently if they do)
  // We just make sure user doc exists
  try {
    await db.createDocument(DB_ID, COL_USERS, me.userId, {
      username: me.username, userId: me.userId
    });
  } catch(e) {}
}

// ===== CHECK SESSION =====
(async () => {
  try {
    const user = await account.get();
    await initApp(user);
  } catch(e) {
    // not logged in
  }
})();

// ===== SEARCH =====
let searchTimer = null;
window.onSearch = (val) => {
  clearTimeout(searchTimer);
  const q = val.trim().replace('@','').toLowerCase();
  if (!q) {
    document.getElementById('search-results').classList.add('hidden');
    return;
  }
  searchTimer = setTimeout(() => searchUsers(q), 400);
};

async function searchUsers(q) {
  const res = document.getElementById('search-results');
  res.classList.remove('hidden');
  res.innerHTML = '<div style="padding:10px;color:var(--text3);font-size:13px;">Поиск…</div>';
  try {
    const r = await db.listDocuments(DB_ID, COL_USERS, [Query.contains('username', q), Query.limit(10)]);
    const found = r.documents.filter(d => d.userId !== me.userId);
    if (!found.length) { res.innerHTML = '<div style="padding:10px;color:var(--text3);font-size:13px;">Не найдено</div>'; return; }
    res.innerHTML = found.map(u => `
      <div class="search-result-item" onclick="openChat('${u.userId}','${u.username}')">
        <div class="chat-avatar" style="width:40px;height:40px;font-size:15px;">${u.username[0].toUpperCase()}</div>
        <div><div style="font-weight:600;font-size:14px;">@${u.username}</div></div>
      </div>`).join('');
  } catch(e) {
    res.innerHTML = '<div style="padding:10px;color:var(--accent2);font-size:13px;">Ошибка поиска</div>';
  }
}

// ===== CHATS LIST =====
async function loadChats() {
  try {
    const r = await db.listDocuments(DB_ID, COL_MSGS, [
      Query.or([Query.equal('from', me.userId), Query.equal('to', me.userId)]),
      Query.orderDesc('$createdAt'), Query.limit(200)
    ]);
    // group by chat partner
    const seen = {};
    for (const msg of r.documents) {
      const partner = msg.from === me.userId ? msg.to : msg.from;
      if (!seen[partner]) seen[partner] = msg;
    }
    chatsMap = seen;
    // fetch usernames
    const ids = Object.keys(seen);
    if (!ids.length) return;
    const users = await db.listDocuments(DB_ID, COL_USERS, [Query.equal('userId', ids)]);
    const userMap = {};
    users.documents.forEach(u => userMap[u.userId] = u.username);
    renderChats(seen, userMap);
  } catch(e) { console.error(e); }
}

function renderChats(seen, userMap) {
  const cont = document.getElementById('chats-container');
  const entries = Object.entries(seen).sort((a,b) => new Date(b[1].$createdAt) - new Date(a[1].$createdAt));
  cont.innerHTML = entries.map(([uid, msg]) => {
    const uname = userMap[uid] || uid;
    const preview = previewText(msg);
    const time = formatTime(msg.$createdAt);
    return `<div class="chat-item" onclick="openChat('${uid}','${uname}')" id="ci-${uid}">
      <div class="chat-avatar">${uname[0].toUpperCase()}</div>
      <div class="chat-info">
        <div class="chat-name">@${uname}</div>
        <div class="chat-preview">${preview}</div>
      </div>
      <div class="chat-meta"><div class="chat-time">${time}</div></div>
    </div>`;
  }).join('');
}

function previewText(msg) {
  if (msg.type === 'text') return msg.content.substring(0,40);
  if (msg.type === 'sticker') return msg.content + ' Стикер';
  if (msg.type === 'voice') return '🎤 Голосовое';
  if (msg.type === 'image') return '🖼 Фото';
  if (msg.type === 'video') return '🎬 Видео';
  if (msg.type === 'circle') return '⭕ Кружок';
  return msg.content || '';
}

function formatTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'сейчас';
  if (diff < 3600000) return Math.floor(diff/60000) + 'м';
  if (d.toDateString() === now.toDateString()) return d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('ru',{day:'2-digit',month:'2-digit'});
}

// ===== OPEN CHAT =====
window.openChat = (userId, username) => {
  // clear search
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').classList.add('hidden');

  currentChat = { userId, username };
  document.getElementById('chat-placeholder').classList.add('hidden');
  const ac = document.getElementById('active-chat');
  ac.classList.remove('hidden');
  ac.style.display = 'flex';

  document.getElementById('ch-name').textContent = '@' + username;
  document.getElementById('ch-avatar').textContent = username[0].toUpperCase();
  document.getElementById('ch-status').textContent = 'в сети';
  document.getElementById('messages-wrap').innerHTML = '';

  // mobile
  if (window.innerWidth <= 640) {
    document.getElementById('sidebar').classList.add('hidden-mobile');
  }

  // highlight chat item
  document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
  const ci = document.getElementById('ci-' + userId);
  if (ci) ci.classList.add('active');

  loadMessages();
  subscribeMessages();
};

window.closeMobileChat = () => {
  document.getElementById('sidebar').classList.remove('hidden-mobile');
  currentChat = null;
  document.getElementById('active-chat').style.display = 'none';
  document.getElementById('chat-placeholder').classList.remove('hidden');
};

// ===== MESSAGES =====
async function loadMessages() {
  if (!currentChat) return;
  try {
    const r = await db.listDocuments(DB_ID, COL_MSGS, [
      Query.or([
        Query.and([Query.equal('from', me.userId), Query.equal('to', currentChat.userId)]),
        Query.and([Query.equal('from', currentChat.userId), Query.equal('to', me.userId)])
      ]),
      Query.orderAsc('$createdAt'), Query.limit(100)
    ]);
    const wrap = document.getElementById('messages-wrap');
    wrap.innerHTML = '';
    r.documents.forEach(msg => appendMessage(msg, false));
    scrollBottom();
  } catch(e) { console.error(e); }
}

function subscribeMessages() {
  if (unsubscribe) { try { unsubscribe(); } catch(e){} }
  unsubscribe = client.subscribe(
    [`databases.${DB_ID}.collections.${COL_MSGS}.documents`],
    e => {
      if (!e.payload) return;
      const msg = e.payload;
      const relevant = (msg.from === me.userId && msg.to === currentChat?.userId) ||
                       (msg.from === currentChat?.userId && msg.to === me.userId);
      if (relevant && e.events.some(ev => ev.includes('create'))) {
        appendMessage(msg, true);
        scrollBottom();
        loadChats(); // refresh sidebar
      }
    }
  );
}

function appendMessage(msg, animate) {
  const wrap = document.getElementById('messages-wrap');
  const isOut = msg.from === me.userId;
  const row = document.createElement('div');
  row.className = `msg-row ${isOut ? 'out' : 'in'}`;
  if (!animate) row.style.animation = 'none';

  const time = formatTime(msg.$createdAt);
  let inner = '';

  if (msg.type === 'text') {
    inner = `<div class="bubble">${escHtml(msg.content)}<span class="bubble-time">${time}</span></div>`;
  } else if (msg.type === 'sticker') {
    inner = `<div class="bubble sticker-bubble"><span class="sticker-emoji">${msg.content}</span><span class="bubble-time" style="font-size:10px;color:var(--text3)">${time}</span></div>`;
  } else if (msg.type === 'image') {
    const url = getFileUrl(msg.fileId);
    inner = `<div class="bubble media-bubble"><img src="${url}" onclick="openModal('img','${url}')" loading="lazy"><span class="bubble-time">${time}</span></div>`;
  } else if (msg.type === 'video') {
    const url = getFileUrl(msg.fileId);
    inner = `<div class="bubble media-bubble"><video src="${url}" controls onclick="openModal('vid','${url}')"></video><span class="bubble-time">${time}</span></div>`;
  } else if (msg.type === 'voice') {
    const url = getFileUrl(msg.fileId);
    const bars = Array.from({length:20}, (_,i) =>
      `<div class="voice-bar" style="height:${10+Math.sin(i*0.8)*8}px"></div>`).join('');
    inner = `<div class="voice-bubble" onclick="playVoice('${url}',this)">
      <button class="voice-play-btn">▶</button>
      <div class="voice-waveform">${bars}</div>
      <span class="voice-dur">${msg.duration || '0:00'}</span>
    </div><span class="bubble-time">${time}</span>`;
  } else if (msg.type === 'circle') {
    const url = getFileUrl(msg.fileId);
    inner = `<div class="bubble circle-bubble"><video src="${url}" autoplay loop muted playsinline></video><span class="bubble-time">${time}</span></div>`;
  }

  if (!isOut) {
    row.innerHTML = `<div class="msg-avatar">${currentChat.username[0].toUpperCase()}</div>${inner}`;
  } else {
    row.innerHTML = inner;
  }
  wrap.appendChild(row);
}

function getFileUrl(fileId) {
  return `${ENDPOINT}/storage/buckets/${BUCKET_ID}/files/${fileId}/view?project=${PROJECT_ID}`;
}

function scrollBottom() {
  const w = document.getElementById('messages-wrap');
  setTimeout(() => { w.scrollTop = w.scrollHeight; }, 50);
}

// ===== SEND =====
async function sendMessage(data) {
  if (!currentChat || !me) return;
  try {
    await db.createDocument(DB_ID, COL_MSGS, ID.unique(), {
      from: me.userId, to: currentChat.userId, ...data
    });
    // Optimistic UI handled by realtime
  } catch(e) { showToast('Ошибка отправки: ' + e.message); }
}

window.sendText = async () => {
  const inp = document.getElementById('msg-input');
  const text = inp.value.trim();
  if (!text || !currentChat) return;
  inp.value = '';
  inp.style.height = '';
  await sendMessage({ type:'text', content: text });
};

window.onKey = (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
};

window.autoResize = (el) => {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
};

// ===== MEDIA =====
window.sendMedia = async (input) => {
  if (!input.files[0] || !currentChat) return;
  const file = input.files[0];
  input.value = '';
  showToast('Загружаем…');
  try {
    const uploaded = await storage.createFile(BUCKET_ID, ID.unique(), file);
    const type = file.type.startsWith('video') ? 'video' : 'image';
    await sendMessage({ type, fileId: uploaded.$id, content: type });
    showToast('Отправлено!');
  } catch(e) { showToast('Ошибка: ' + e.message); }
};

// ===== VOICE =====
window.startVoice = async () => {
  if (!currentChat) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t=>t.stop());
      const blob = new Blob(audioChunks, { type:'audio/webm' });
      const file = new File([blob], 'voice.webm', { type:'audio/webm' });
      showToast('Отправляем голосовое…');
      try {
        const uploaded = await storage.createFile(BUCKET_ID, ID.unique(), file);
        await sendMessage({ type:'voice', fileId: uploaded.$id, content:'voice', duration:'0:' + String(Math.floor(audioChunks.length)).padStart(2,'0') });
      } catch(e) { showToast('Ошибка: ' + e.message); }
    };
    mediaRecorder.start();
    document.getElementById('rec-indicator').classList.add('active');
  } catch(e) { showToast('Нет доступа к микрофону'); }
};

window.stopVoice = () => {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
    document.getElementById('rec-indicator').classList.remove('active');
  }
};

window.playVoice = (url, el) => {
  const audio = new Audio(url);
  audio.play();
  const btn = el.querySelector('.voice-play-btn');
  btn.textContent = '⏸';
  audio.onended = () => { btn.textContent = '▶'; };
};

// ===== CIRCLE (video message) =====
window.sendCircle = async () => {
  if (!currentChat) return;
  showToast('Откройте камеру…');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video:true, audio:true });
    circleStream = stream;
    // Quick 5s recording
    const chunks = [];
    const mr = new MediaRecorder(stream);
    mr.ondataavailable = e => chunks.push(e.data);
    mr.onstop = async () => {
      stream.getTracks().forEach(t=>t.stop());
      const blob = new Blob(chunks, { type:'video/webm' });
      const file = new File([blob], 'circle.webm', { type:'video/webm' });
      showToast('Загружаем кружок…');
      try {
        const uploaded = await storage.createFile(BUCKET_ID, ID.unique(), file);
        await sendMessage({ type:'circle', fileId: uploaded.$id, content:'circle' });
        showToast('Кружок отправлен!');
      } catch(e) { showToast('Ошибка: ' + e.message); }
    };
    mr.start();
    showToast('Запись кружка 5 сек…');
    setTimeout(() => { mr.stop(); }, 5000);
  } catch(e) { showToast('Нет доступа к камере'); }
};

// ===== MODAL =====
window.openModal = (type, url) => {
  const m = document.getElementById('modal');
  const mc = document.getElementById('modal-content');
  mc.innerHTML = type === 'img'
    ? `<img src="${url}">`
    : `<video src="${url}" controls autoplay style="max-width:92vw;max-height:88vh;border-radius:14px">`;
  m.style.display = 'flex';
};
window.closeModal = () => { document.getElementById('modal').style.display = 'none'; };

// ===== TOAST =====
function showToast(msg) {
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}
window.showToast = showToast;

// ===== HELPERS =====
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
</script>
</body>
</html>
